<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pac-Man Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>PAC-MAN</h1>
            <div class="game-info">
                <div class="score-container">
                    <span class="label">SCORE</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="lives-container">
                    <span class="label">LIVES</span>
                    <div id="lives" class="lives-display">
                        <span class="life">●</span>
                        <span class="life">●</span>
                        <span class="life">●</span>
                    </div>
                </div>
            </div>
        </header>

        <main class="game-main">
            <div class="game-area">
                <canvas id="gameCanvas" width="800" height="600"></canvas>
                
                <div id="gameMessage" class="game-message">
                    <h2 id="messageTitle">READY!</h2>
                    <p id="messageText">Use arrow keys to move Pac-Man</p>
                    <button id="startButton" class="game-button">START GAME</button>
                </div>
            </div>

            <div class="controls">
                <div class="control-info">
                    <h3>CONTROLS</h3>
                    <div class="control-grid">
                        <div class="control-item">
                            <span class="key">↑</span>
                            <span class="action">Move Up</span>
                        </div>
                        <div class="control-item">
                            <span class="key">↓</span>
                            <span class="action">Move Down</span>
                        </div>
                        <div class="control-item">
                            <span class="key">←</span>
                            <span class="action">Move Left</span>
                        </div>
                        <div class="control-item">
                            <span class="key">→</span>
                            <span class="action">Move Right</span>
                        </div>
                        <div class="control-item">
                            <span class="key">SPACE</span>
                            <span class="action">Start/Restart</span>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="mazeData.js"></script>
    <script src="pacman.js"></script>
</body>
</html>
